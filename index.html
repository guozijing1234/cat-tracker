const todayStr = () => new Date().toISOString().slice(0,10);
const calcAge = (bday) => {
  if (!bday) return null;
  const b = new Date(bday), now = new Date();
  let y = now.getFullYear() - b.getFullYear();
  let m = now.getMonth() - b.getMonth();
  if (m < 0) { y--; m += 12; }
  return `${y}歲${m}個月`;
};

const getStorage = async (key) => {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
  catch { return null; }
};
const setStorage = async (key, val) => {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
};
const loadAllRecords = async (catId) => {
  const keys = await (async()=>{ const _p=`daily:${catId}:`; const _k=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(_p))_k.push(k); } return {keys:_k}; })();
  const loaded = [];
  for (const k of (keys?.keys||[])) {
    const v = await getStorage(k);
    if (v) loaded.push({ date: k.replace(`daily:${catId}:`,""), ...v });
  }
  return loaded.sort((a,b)=>a.date.localeCompare(b.date));
};

  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.behavior-dim-title { font-size: 13px; font-weight: 800; color: var(--text); display:block; line-height:1.2; }
.behavior-dim-desc  { font-size: 10px; font-weight: 500; color: var(--text3); display:block; margin-top:1px; }
.behavior-score-val { font-size: 18px; font-weight: 900; flex-shrink:0; }
.behavior-score-row { display:flex; gap:5px; }
.behavior-score-btn {
  flex: 1; padding: 8px 4px 6px;
  border-radius: 12px;
  border: 2px solid rgba(41,128,212,0.12);
  background: rgba(255,255,255,0.7);
  cursor: pointer; text-align: center;
  font-family: var(--font); transition: all .18s;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.behavior-score-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.behavior-score-btn.bsa   { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.bsn { font-size: 14px; font-weight: 900; display:block; line-height:1; }
.bsl { font-size: 9px;  font-weight: 700; color: var(--text2); display:block; line-height:1.2; }
.bss { font-size: 8px;  font-weight: 500; color: var(--text3); display:block; line-height:1.2; margin-top:1px; }

/* ── Texture grid ── */
.texture-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.tex-btn {
  padding: 10px 6px;
  border-radius: var(--radius-sm);
  border: 2px solid rgba(41,128,212,0.12);
  background: rgba(255,255,255,0.7);
  cursor: pointer; text-align:center;
  font-family: var(--font);
  transition: all .18s;
}
.tex-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.tex-btn.ta { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.ti { font-size: 20px; display:block; line-height:1; margin-bottom:3px; }
.tl { font-size: 11px; font-weight: 700; color: var(--text2); display:block; }

/* ── Eat status ── */
.eat-row { display:grid; grid-template-columns: repeat(3,1fr); gap:8px; }
.eat-row-2 { display:grid; grid-template-columns: repeat(2,1fr); gap:8px; margin-top:8px; }
.eat-btn {
  padding: 11px 6px;
  border-radius: var(--radius-sm);
  border: 2px solid rgba(41,128,212,0.12);
  background: rgba(255,255,255,0.7);
  font-size: 13px; font-weight: 700; cursor: pointer;
  text-align: center; color: var(--text2);
  font-family: var(--font); transition: all .18s;
}
.eat-btn.ea-done  { background:#f0fdf4; border-color:#86efac; color:#166534; box-shadow: 0 4px 12px rgba(34,197,94,.2); }
.eat-btn.ea-third { background:#ecfdf5; border-color:#6ee7b7; color:#065f46; box-shadow: 0 4px 12px rgba(16,185,129,.2); }
.eat-btn.ea-two3  { background:#fff7ed; border-color:#fdba74; color:#c2410c; box-shadow: 0 4px 12px rgba(249,115,22,.15); }
.eat-btn.ea-half  { background:#fff3e0; border-color:#fcd34d; color:#b45309; box-shadow: 0 4px 12px rgba(245,158,11,.15); }
.eat-btn.ea-skip  { background:#fef2f2; border-color:#fca5a5; color:#b91c1c; box-shadow: 0 4px 12px rgba(239,68,68,.2); }

/* ── Chips ── */
.chips { display:flex; flex-wrap:wrap; gap:7px; }
.chip {
  padding: 7px 14px; border-radius: 50px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  border: 2px solid rgba(41,128,212,0.15);
  background: rgba(255,255,255,0.8);
  color: var(--text2); transition: all .15s;
  font-family: var(--font);
}
.chip.ac { border-color: var(--accent); background: rgba(41,128,212,0.1); color: var(--accent); box-shadow: 0 2px 8px rgba(41,128,212,.2); }
.chip-sm { font-size: 12px; padding: 5px 12px; }

/* ── Issue chips ── */
.issue-chip {
  padding: 6px 12px; border-radius: 50px;
  font-size: 12px; font-weight: 700; cursor: pointer;
  border: 2px solid rgba(41,128,212,0.12);
  background: rgba(255,255,255,0.8);
  color: var(--text2); transition: all .15s;
  font-family: var(--font);
}
.issue-chip.ia { border-color: #fca5a5; background: #fef2f2; color: #b91c1c; }

/* ── Add buttons ── */
.add-btn {
  display: flex; align-items:center; gap:4px;
  font-size: 12px; font-weight: 800;
  padding: 6px 12px; border-radius: 50px;
  cursor: pointer; border: 2px solid;
  background: transparent; font-family: var(--font);
  transition: all .15s; white-space: nowrap;
}
.add-p { border-color: var(--accent); color: var(--accent); }
.add-p:hover { background: var(--accent); color: white; }
.add-s { border-color: rgba(41,128,212,0.25); color: var(--text2); }
.add-s:hover { background: rgba(41,128,212,0.1); }
.add-row { display:flex; gap:6px; }

/* ── Sub items ── */
.sub-item {
  border: 2px solid rgba(41,128,212,0.12);
  border-radius: var(--radius-sm);
  padding: 12px 13px;
  margin-bottom: 8px;
  background: rgba(41,128,212,0.03);
}
.sub-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.del-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: none; background: #fee2e2;
  color: #dc2626; font-size: 14px; cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  flex-shrink: 0; font-weight: 700;
}

/* ── Divider ── */
.divider { height: 1.5px; background: rgba(41,128,212,0.1); margin: 12px 0; border-radius: 1px; }

/* ── Empty ── */
.empty-hint {
  text-align: center; padding: 12px 0 4px;
  color: var(--text3); font-size: 13px; font-weight: 600;
}

/* ── Reminders notification area ── */
.notif-area {
  margin: 8px 14px 0;
  background: white;
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.notif-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  cursor: pointer; user-select: none;
}
.notif-header-left { display: flex; align-items: center; gap: 8px; }
.notif-header-title { font-size: 13px; font-weight: 800; color: var(--text); }
.notif-badge {
  font-size: 10px; font-weight: 800;
  background: #ef4444; color: white;
  padding: 2px 7px; border-radius: 50px;
}
.notif-badge.ok { background: #22c55e; }
.notif-toggle { font-size: 12px; color: var(--text3); font-weight: 600; }
.notif-list { display: flex; flex-direction: column; }
.notif-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  transition: background .12s;
}
.notif-row:last-child { border-bottom: none; }
.notif-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.notif-icon {
  font-size: 18px; line-height: 1;
  width: 34px; height: 34px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.notif-info { flex: 1; min-width: 0; }
.notif-title { font-size: 13px; font-weight: 700; color: var(--text); display: block; }
.notif-meta { display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
.notif-meta-item {
  font-size: 11px; font-weight: 600;
  display: flex; align-items: center; gap: 3px;
}
.notif-action {
  padding: 6px 12px; border-radius: 50px; border: none;
  font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: var(--font); flex-shrink: 0;
  transition: all .15s;
}

/* ── FMPI Assessment ── */
.fmpi-page { padding: 14px 14px 100px; }
.fmpi-intro {
  background: #eff6ff; border: 1.5px solid #bfdbfe;
  border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;
}
.fmpi-intro-title { font-size: 14px; font-weight: 900; color: #1e40af; margin-bottom: 4px; }
.fmpi-intro-sub { font-size: 12px; font-weight: 500; color: #3b82f6; line-height: 1.5; }
.fmpi-section { margin-bottom: 20px; }
.fmpi-section-title {
  font-size: 11px; font-weight: 800; color: var(--text3);
  letter-spacing: .5px; text-transform: uppercase;
  margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1.5px solid var(--border);
}
.fmpi-q {
  background: white; border-radius: 14px;
  border: 1.5px solid var(--border);
  padding: 13px 14px; margin-bottom: 8px;
}
.fmpi-q-text {
  font-size: 13px; font-weight: 700; color: var(--text);
  margin-bottom: 10px; line-height: 1.4;
}
.fmpi-scale {
  display: flex; gap: 5px;
}
.fmpi-scale-btn {
  flex: 1; padding: 8px 4px; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: rgba(255,255,255,0.7);
  cursor: pointer; text-align: center;
  font-family: var(--font); transition: all .15s;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.fmpi-scale-btn.active { border-width: 2px; transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.fmpi-scale-n { font-size: 14px; font-weight: 900; display: block; }
.fmpi-scale-l { font-size: 8px; font-weight: 600; color: var(--text3); display: block; line-height: 1.2; }
.fmpi-yesno { display: flex; gap: 8px; margin-top: 4px; }
.fmpi-yn-btn {
  flex: 1; padding: 9px; border-radius: 10px;
  border: 1.5px solid var(--border); background: white;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: var(--font); transition: all .15s;
}
.fmpi-yn-btn.yes-active { background: #dcfce7; border-color: #22c55e; color: #16a34a; }
.fmpi-yn-btn.no-active  { background: #fef2f2; border-color: #ef4444; color: #dc2626; }
.fmpi-score-card {
  background: white; border-radius: 16px;
  border: 2px solid var(--border);
  padding: 18px; margin-bottom: 16px; text-align: center;
}
.fmpi-score-num { font-size: 48px; font-weight: 900; line-height: 1; }
.fmpi-score-max { font-size: 16px; font-weight: 600; color: var(--text3); }
.fmpi-score-label { font-size: 14px; font-weight: 700; margin-top: 6px; }
.fmpi-history-item {
  background: white; border-radius: 12px;
  border: 1.5px solid var(--border);
  padding: 12px 14px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.fmpi-save-btn {
  width: 100%; padding: 15px;
  border: none; border-radius: 16px;
  font-size: 16px; font-weight: 800; cursor: pointer;
  font-family: var(--font); color: white;
  transition: all .2s; margin-top: 8px;
}

/* ── Bottom bar ── */
.bottom-bar {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 480px;
  z-index: 60;
  background: #f3f4f8;
  padding: 10px 14px 16px;
  display: flex; gap: 8px;
}
.save-btn {
  flex: 2;
  padding: 0 16px; height: 52px;
  border: none; border-radius: 16px;
  font-size: 15px; font-weight: 800; cursor: pointer;
  font-family: var(--font); color: white;
  transition: all .2s cubic-bezier(.34,1.3,.64,1);
  box-shadow: 0 4px 16px rgba(58,111,168,0.35);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.save-btn:active:not(:disabled) { transform: scale(0.97); }
.save-btn.done { background: #b0bec5 !important; box-shadow: none; }
.save-btn:disabled {
  background: #e2e4ea !important;
  color: #b0b6c4 !important;
  box-shadow: none !important;
  cursor: not-allowed;
  transform: none !important;
}
.hist-btn {
  flex: 1;
  height: 52px;
  border-radius: 16px;
  border: none;
  background: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  font-size: 13px; font-weight: 700; cursor: pointer;
  color: var(--text2); font-family: var(--font);
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all .15s;
}
.hist-btn:active { transform: scale(0.97); }

/* ── Reminders ── */
.reminder-popup-overlay {
  position: fixed; inset: 0;
  background: rgba(10,20,50,0.5);
  backdrop-filter: blur(6px);
  z-index: 400;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.reminder-popup {
  background: white; border-radius: 24px;
  width: 100%; max-width: 420px;
  max-height: 80vh; overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,0.2);
  animation: toast-in .25s cubic-bezier(.34,1.4,.64,1) forwards;
}
.reminder-popup-head {
  padding: 20px 20px 0;
  display: flex; align-items: center; gap: 10px;
}
.reminder-popup-title { font-size: 17px; font-weight: 900; color: var(--text); flex: 1; }
.reminder-popup-close {
  width: 32px; height: 32px; border-radius: 50%;
  border: none; background: #f1f5f9; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text2); font-weight: 700;
}
.reminder-popup-body { padding: 14px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
.reminder-item {
  border-radius: 16px; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.reminder-item-head { display: flex; align-items: center; gap: 10px; }
.reminder-item-icon { font-size: 22px; line-height: 1; }
.reminder-item-info { flex: 1; min-width: 0; }
.reminder-item-title { font-size: 14px; font-weight: 800; color: var(--text); display: block; }
.reminder-item-sub { font-size: 12px; font-weight: 600; display: block; margin-top: 2px; }
.reminder-badge {
  font-size: 11px; font-weight: 800; padding: 4px 10px;
  border-radius: 50px; white-space: nowrap; flex-shrink: 0;
}
.reminder-done-btn {
  padding: 8px 16px; border-radius: 50px; border: none;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: var(--font); align-self: flex-start;
  transition: all .15s;
}
.reminder-settings { padding: 10px 0 0; }
.reminder-settings-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.reminder-settings-lbl { font-size: 12px; font-weight: 700; color: var(--text2); flex: 1; }
.reminder-cycle-inp {
  width: 56px; padding: 6px 8px; border-radius: 8px;
  border: 1.5px solid rgba(41,128,212,0.2);
  font-size: 13px; font-weight: 700; text-align: center;
  background: rgba(41,128,212,0.04); color: var(--text);
  font-family: var(--font);
}
.reminder-cycle-inp:focus { outline: none; border-color: var(--accent); }

/* ── Reminder banner cards ── */
.reminder-banners { padding: 10px 14px 0; display: flex; flex-direction: column; gap: 8px; }
.reminder-banner {
  border-radius: 14px; padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: opacity .15s;
}
.reminder-banner:hover { opacity: .92; }
.reminder-banner-icon { font-size: 22px; line-height: 1; flex-shrink: 0; }
.reminder-banner-info { flex: 1; min-width: 0; }
.reminder-banner-title { font-size: 13px; font-weight: 800; color: white; display: block; }
.reminder-banner-sub { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.8); display: block; margin-top: 2px; }
.reminder-banner-action {
  font-size: 12px; font-weight: 800; padding: 6px 12px;
  border-radius: 50px; border: none; cursor: pointer;
  font-family: var(--font); flex-shrink: 0;
  background: rgba(255,255,255,0.25); color: white;
  transition: background .15s;
}
.reminder-banner-action:hover { background: rgba(255,255,255,0.4); }
.reminder-bell-btn {
  position: fixed; bottom: 88px; right: 16px; z-index: 55;
  width: 46px; height: 46px; border-radius: 50%;
  border: none; background: white;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s;
}
.reminder-bell-btn:hover { transform: scale(1.08); }
.reminder-bell-badge {
  position: absolute; top: -2px; right: -2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: #ef4444; color: white;
  font-size: 10px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid white;
}

/* ── Training ── */
.training-item {
  border: 1.5px solid rgba(41,128,212,0.15);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.7);
  margin-bottom: 7px;
  overflow: hidden;
  transition: all .15s;
}
.training-item.selected {
  border-color: var(--accent);
  background: rgba(41,128,212,0.04);
}
.training-item-head {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 13px; cursor: pointer;
}
.training-item-icon {
  font-size: 18px; width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(41,128,212,0.08); flex-shrink: 0;
}
.training-item-label { font-size: 14px; font-weight: 700; color: var(--text); flex: 1; }
.training-check {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid rgba(41,128,212,0.25);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.training-item.selected .training-check {
  background: var(--accent); border-color: var(--accent);
}
.training-status-row {
  display: flex; gap: 5px; flex-wrap: wrap;
  padding: 0 13px 11px;
}
.tstatus-btn {
  padding: 4px 11px; border-radius: 50px;
  font-size: 12px; font-weight: 700; cursor: pointer;
  border: 1.5px solid; font-family: var(--font);
  transition: all .13s;
}

/* ── Activity log ── */
.activity-toggle {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  border: 2px solid rgba(41,128,212,0.15);
  background: rgba(255,255,255,0.7);
  cursor: pointer; font-family: var(--font);
  transition: all .18s; margin-bottom: 10px;
}
.activity-toggle.on { border-color: var(--accent); background: rgba(41,128,212,0.06); }
.activity-toggle-dot {
  width: 36px; height: 20px; border-radius: 10px;
  background: #d1d5db; position: relative; flex-shrink: 0;
  transition: background .2s;
}
.activity-toggle.on .activity-toggle-dot { background: var(--accent); }
.activity-toggle-dot::after {
  content: '';
  position: absolute; top: 2px; left: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: white; transition: transform .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.activity-toggle.on .activity-toggle-dot::after { transform: translateX(16px); }
.activity-toggle-label { font-size: 14px; font-weight: 700; color: var(--text2); flex: 1; }
.activity-toggle.on .activity-toggle-label { color: var(--accent); }
.activity-expand {
  background: rgba(41,128,212,0.04);
  border: 1.5px solid rgba(41,128,212,0.15);
  border-radius: var(--radius-sm);
  padding: 12px 13px; margin-bottom: 10px;
}

/* ── Medication record ── */
.med-item {
  border: 2px solid #d1fae5;
  border-radius: var(--radius-sm);
  padding: 12px 13px; margin-bottom: 8px;
  background: #f0fdf4;
}
.med-label {
  font-size: 10px; font-weight: 800; color: #065f46;
  letter-spacing: .4px; text-transform: uppercase;
  margin-bottom: 4px; display: block;
}
.med-inp {
  width: 100%; padding: 8px 11px;
  border: 1.5px solid #a7f3d0;
  border-radius: 10px; font-size: 13px; font-weight: 600;
  background: white; color: var(--text); font-family: var(--font);
  transition: border-color .15s;
}
.med-inp:focus { outline: none; border-color: #10b981; }
.med-inp::placeholder { color: var(--text3); font-weight: 500; }
.med-given-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; border-radius: 50px;
  border: 2px solid #a7f3d0; background: white;
  font-size: 13px; font-weight: 700; cursor: pointer;
  color: #065f46; font-family: var(--font); transition: all .15s;
}
.med-given-btn.given { background: #10b981; border-color: #10b981; color: white; }
.med-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #a7f3d0; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.med-given-btn.given .med-check { background: white; border-color: white; }

/* ── Vet record ── */
.vet-item {
  border: 2px solid #bfdbfe;
  border-radius: var(--radius-sm);
  padding: 12px 13px; margin-bottom: 8px;
  background: #eff6ff;
}
.vet-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.vet-label {
  font-size: 10px; font-weight: 800; color: #1e40af;
  letter-spacing: .4px; text-transform: uppercase;
  margin-bottom: 4px; display: block;
}
.vet-inp {

// ─── SVG Charts ───────────────────────────────────────────────────────────────
function WeightChart({ records, color }) {
  const pts = records.filter(r => r.weight && !isNaN(parseFloat(r.weight)))
    .slice(-30).map(r => ({ date: r.date, w: parseFloat(r.weight) }));
  if (pts.length < 2) return <div className="no-data">記錄 2 天以上才會顯示趨勢 ✨</div>;
  const W=420, H=160, PL=40, PR=14, PT=14, PB=28;
  const iw=W-PL-PR, ih=H-PT-PB;
  const ws=pts.map(p=>p.w);
  const mn=Math.min(...ws), mx=Math.max(...ws), rng=(mx-mn)||0.5;
  const pad=rng*0.22, yMin=mn-pad, yMax=mx+pad;
  const xOf=i=>PL+(i/(pts.length-1))*iw;
  const yOf=v=>PT+ih-((v-yMin)/(yMax-yMin))*ih;
  const pathD=pts.map((p,i)=>`${i===0?"M":"L"}${xOf(i).toFixed(1)},${yOf(p.w).toFixed(1)}`).join(" ");
  const areaD=pathD+` L${xOf(pts.length-1).toFixed(1)},${(PT+ih).toFixed(1)} L${PL.toFixed(1)},${(PT+ih).toFixed(1)} Z`;
  const gid=`wg${color.replace(/[^a-z0-9]/gi,"")}`;
  const yTicks=[0,.5,1].map(t=>yMin+(yMax-yMin)*t);
  const xLbls=[0,Math.floor((pts.length-1)/2),pts.length-1].filter((v,i,a)=>a.indexOf(v)===i);
  return (
    <div style={{width:"100%",overflow:"hidden"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
            <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
          </linearGradient>
        </defs>
        {yTicks.map((t,i)=>(
          <g key={i}>
            <line x1={PL} y1={yOf(t)} x2={W-PR} y2={yOf(t)} stroke="rgba(41,128,212,0.08)" strokeWidth="1.5" strokeDasharray="4,4"/>
            <text x={PL-5} y={yOf(t)+4} textAnchor="end" fontSize="10" fontWeight="600" fill="#80aad4">{t.toFixed(1)}</text>
          </g>
        ))}
        <path d={areaD} fill={`url(#${gid})`}/>
        <path d={pathD} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <circle key={i} cx={xOf(i)} cy={yOf(p.w)} r="4.5" fill={color} stroke="white" strokeWidth="2.5"/>
        ))}
        {xLbls.map(i=>(
          <text key={i} x={xOf(i)} y={H-4} textAnchor="middle" fontSize="10" fontWeight="600" fill="#80aad4">{pts[i].date.slice(5)}</text>
        ))}
      </svg>
    </div>
  );
}

function VitalityDonut({ records, color }) {
  const counts={};
  VITALITY.forEach(v=>counts[v.v]=0);
  records.forEach(r=>{if(r.vitality&&counts[r.vitality]!==undefined)counts[r.vitality]++;});
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  if(!total) return <div className="no-data">尚無活力記錄 💫</div>;
  const COLS={"🌟":"#f59e0b","😊":"#22c55e","😴":"#818cf8","😟":"#f472b6","🚨":"#ef4444"};
  const CX=75,CY=75,R=60,IR=36;
  let sa=-Math.PI/2;
  const slices=VITALITY.map(v=>{
    const val=counts[v.v], angle=(val/total)*Math.PI*2;
    const s={v:v.v,label:v.label,val,angle,sa,color:COLS[v.v]};
    sa+=angle; return s;
  }).filter(s=>s.val>0);
  const arc=(sa,ea,r,ir)=>{
    const x1=CX+r*Math.cos(sa),y1=CY+r*Math.sin(sa);
    const x2=CX+r*Math.cos(ea),y2=CY+r*Math.sin(ea);
    const x3=CX+ir*Math.cos(ea),y3=CY+ir*Math.sin(ea);
    const x4=CX+ir*Math.cos(sa),y4=CY+ir*Math.sin(sa);
    const lg=(ea-sa)>Math.PI?1:0;
    return `M${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${lg},1 ${x2.toFixed(2)},${y2.toFixed(2)} L${x3.toFixed(2)},${y3.toFixed(2)} A${ir},${ir} 0 ${lg},0 ${x4.toFixed(2)},${y4.toFixed(2)} Z`;
  };
  return (
    <div style={{display:"flex",alignItems:"center",gap:14}}>
      <svg viewBox="0 0 150 150" style={{width:120,height:120,flexShrink:0}}>
        {slices.map((s,i)=><path key={i} d={arc(s.sa,s.sa+s.angle,R,IR)} fill={s.color}/>)}
        <text x={CX} y={CY-5} textAnchor="middle" fontSize="24" fill="#0f2d52">{slices.sort((a,b)=>b.val-a.val)[0]?.v}</text>
        <text x={CX} y={CY+13} textAnchor="middle" fontSize="11" fontWeight="700" fill="#80aad4">{total} 天</text>
      </svg>
      <div style={{flex:1}}>
        {slices.sort((a,b)=>b.val-a.val).map(s=>(
          <div key={s.v} style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
            <span style={{width:10,height:10,borderRadius:"50%",background:s.color,flexShrink:0,display:"inline-block"}}/>
            <span style={{fontSize:12,fontWeight:700,color:"#3a6fa8",flex:1}}>{s.v} {s.label}</span>
            <span style={{fontSize:13,fontWeight:900,color:"#0f2d52"}}>{Math.round(s.val/total*100)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function EatenChart({ records, color }) {
  if(!records.length) return <div className="no-data">尚無飲食記錄 🐾</div>;
  const recent=records.slice(-28);
  const withEat=recent.filter(r=>r.wets?.[0]?.eaten);
  if(!withEat.length) return <div className="no-data">尚無濕食記錄 🐾</div>;
  const done=withEat.filter(r=>r.wets[0].eaten==="✓").length;
  const half=withEat.filter(r=>r.wets[0].eaten==="◑"||r.wets[0].eaten==="½").length;
  const skip=withEat.filter(r=>r.wets[0].eaten==="✕").length;
  const tot=withEat.length;
  const bars=[{l:"吃完",v:done,c:"#22c55e"},{l:"吃一半",v:half,c:"#f97316"},{l:"沒吃",v:skip,c:"#ef4444"}];
  const maxV=Math.max(...bars.map(b=>b.v),1);
  const W=380,H=120,PL=52,PB=26,PT=10,PR=16;
  const bw=(W-PL-PR)/bars.length, ih=H-PT-PB;
  return (
    <div>
      <div style={{textAlign:"center",marginBottom:12}}>
        <span style={{fontSize:32,fontWeight:900,color}}>{Math.round(done/tot*100)}%</span>
        <span style={{fontSize:13,fontWeight:700,color:"#80aad4",marginLeft:8}}>近{tot}次吃完率</span>
      </div>
      <div style={{width:"100%",overflow:"hidden"}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
          {bars.map((b,i)=>{
            const bh=(b.v/maxV)*ih, x=PL+i*bw+bw*0.18, bwd=bw*0.64, y=PT+ih-bh;
            return (
              <g key={i}>
                <rect x={x} y={PT} width={bwd} height={ih} rx="8" fill="rgba(41,128,212,0.06)"/>
                <rect x={x} y={y} width={bwd} height={bh} rx="8" fill={b.c}/>
                <text x={x+bwd/2} y={H-5} textAnchor="middle" fontSize="11" fontWeight="700" fill="#80aad4">{b.l}</text>
                {b.v>0 && <text x={x+bwd/2} y={y-5} textAnchor="middle" fontSize="12" fontWeight="900" fill={b.c}>{b.v}</text>}
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

function FoodRanking({ records, color }) {
  const counts={};
  records.forEach(r=>{(r.wets||[]).forEach(w=>{const f=w.food?.trim();if(f)counts[f]=(counts[f]||0)+1;})});
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  if(!sorted.length) return <div className="no-data">尚無濕食記錄 🐾</div>;
  const max=sorted[0][1];
  return (
    <div>
      {sorted.map(([name,count],i)=>(
        <div key={i} className="rank-item">
          <div className="rank-no" style={{color:i===0?color:"#80aad4"}}>{i+1}</div>
          <div className="rank-bar-area">
            <div className="rank-name">{name}</div>
            <div className="rank-bar-bg">
              <div className="rank-bar-fill" style={{width:`${count/max*100}%`,background:i===0?color:"rgba(41,128,212,0.3)"}}/>
            </div>
          </div>
          <div className="rank-n">{count}次</div>
        </div>
      ))}
    </div>
  );
}

function IssueHeatmap({ records, color }) {
  const counts={};
  ALL_ISSUES.forEach(v=>counts[v]=0);
  records.forEach(r=>(r.issues||[]).forEach(v=>{if(counts[v]!==undefined)counts[v]++;}));
  const sorted=Object.entries(counts).filter(([,n])=>n>0).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length) return <div className="no-data">近期無問題狀況記錄 🎉</div>;
  const max=sorted[0][1];
  return (
    <div>
      {sorted.map(([name,count])=>(
        <div key={name} className="iss-row">
          <div className="iss-name">{name}</div>
          <div className="iss-bar-bg">
            <div className="iss-bar-fill" style={{width:`${Math.max(count/max*100,10)}%`,background:`${color}cc`}}>
              <span className="iss-n">{count}</span>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function AttitudeChart({ records }) {
  const counts={"😍":0,"⚡":0,"🐢":0};
  records.forEach(r=>{(r.wets||[]).forEach(w=>{if(w.attitude&&counts[w.attitude]!==undefined)counts[w.attitude]++;})});
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  if(!total) return <div className="no-data">尚無吃飯態度記錄 🐾</div>;
  const items=[
    {v:"😍",l:"吃愛",bg:"#fce7f3",c:"#db2777"},
    {v:"⚡",l:"馬上吃",bg:"#fef3c7",c:"#d97706"},
    {v:"🐢",l:"等很久",bg:"#f1f5f9",c:"#64748b"},
  ];
  return (
    <div className="attitude-row">
      {items.map(it=>(
        <div key={it.v} className="att-box" style={{background:it.bg}}>
          <span className="att-emoji">{it.v}</span>
          <span className="att-n" style={{color:it.c}}>{counts[it.v]}</span>
          <span className="att-l">{it.l}</span>
          <span className="att-pct">{total?Math.round(counts[it.v]/total*100):0}%</span>
        </div>
      ))}
    </div>
  );
}

function HistoryPage({ cat, catId, color, onClose }) {

        const prefixes = [
          "daily:", `daily:${catId}:`,
          "record:", `record:${catId}:`,
          "cat:", "data:", "entry:",
        ];
        const found = {};
        for (const prefix of prefixes) {
          const result = await (async()=>{ const _p=prefix; const _k=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(_p))_k.push(k); } return {keys:_k}; })();
          if (result?.keys?.length) found[prefix] = result.keys;
        }
        console.log("=== STORAGE SCAN RESULT ===");
        console.log(JSON.stringify(found, null, 2));
        // Also try listing with empty string to get ALL keys
        const allResult = await (async()=>{ const _p=""; const _k=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(_p))_k.push(k); } return {keys:_k}; })();
        console.log("=== ALL KEYS ===");
        console.log(JSON.stringify(allResult?.keys));
      } catch(e){ console.log("scan error", e); }
    })();
  },[catId]);

                {r.toiletCryTiming?.length>0&&<div className="hexp-row"><span className="hexp-k" style={{color:"#d97706"}}>叫聲</span><span style={{color:"#d97706"}}>上廁所時會叫 · {r.toiletCryTiming.join("、")}</span></div>}
                {r.issueLinks?.length>0&&<div className="hexp-row"><span className="hexp-k">媒體</span><span>{r.issueLinks.map((lk,i)=>(
                  <span key={i} style={{marginRight:8}}>{lk.label} <a href={lk.url} target="_blank" rel="noreferrer" style={{color:"var(--accent)"}}>{lk.url.slice(0,28)}{lk.url.length>28?"…":""}</a></span>
                ))}</span></div>}
                {r.note&&<div className="hexp-row"><span className="hexp-k">備註</span><span>{r.note}</span></div>}
                {r.meds?.length>0&&<div className="hexp-row"><span className="hexp-k" style={{color:"#065f46"}}>用藥</span><span style={{color:"#065f46"}}>{r.meds.map(m=>`${m.name}${m.dose?` ${m.dose}${m.unit}`:""}${m.given?" ✓":" —"}`).join("、")}</span></div>}
                {r.vetVisits?.length>0&&<div className="hexp-row"><span className="hexp-k" style={{color:"#1d4ed8"}}>就醫</span><span style={{color:"#1d4ed8"}}>{r.vetVisits.map(v=>[v.clinic,v.reason,v.diagnosis].filter(Boolean).join(" · ")).join("；")}</span></div>}
                <button className="hdel-btn" onClick={()=>del(r.date)}>刪除此筆</button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Backup helpers ───────────────────────────────────────────────────────────
const collectAllData = async () => {
  const all = {};
  for (const c of [{id:"sakura"},{id:"xi"}]) {
    const catMeta = await getStorage(`cat:${c.id}`);
    const keys = await (async()=>{ const _p=`daily:${c.id}:`; const _k=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(_p))_k.push(k); } return {keys:_k}; })();
    const records = {};
    for (const k of (keys?.keys||[])) {
      const v = await getStorage(k);
      if (v) records[k.replace(`daily:${c.id}:`,"")] = v;
    }
    // 也收集評估量表資料
    const fmpi = await getStorage(`fmpi:${c.id}`);
    const hhhhhmm = await getStorage(`hhhhhmm:${c.id}`);
    const mcs = await getStorage(`mcs:${c.id}`);
    const bcs = await getStorage(`bcs:${c.id}`);
    all[c.id] = { profile: catMeta, records, fmpi, hhhhhmm, mcs, bcs };
  }
  // 提醒事項
  const reminders = await getStorage("reminders:global");
  all._reminders = reminders;
  return all;
};

const downloadJSON = async () => {
  const all = await collectAllData();
  const json = JSON.stringify(all, null, 2);
  await setStorage("backup:lastExport", todayStr());

  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;flex-direction:column;padding:16px;gap:10px;";
  const title = document.createElement("div");
  title.style.cssText = "color:white;font-size:15px;font-weight:800;font-family:sans-serif;";
  title.textContent = "📋 請全選並複製以下資料，儲存到備忘錄或文字檔";
  const ta = document.createElement("textarea");
  ta.value = json;
  ta.style.cssText = "flex:1;border-radius:12px;border:none;font-size:11px;padding:12px;font-family:monospace;resize:none;";
  ta.readOnly = true;
  const btnRow = document.createElement("div");
  btnRow.style.cssText = "display:flex;gap:10px;";
  const copyBtn = document.createElement("button");
  copyBtn.textContent = "📋 全選複製";
  copyBtn.style.cssText = "flex:2;padding:13px;background:#3a6fa8;color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:sans-serif;";
  copyBtn.onclick = async () => {
    ta.select();
    try { await navigator.clipboard.writeText(json); } catch { document.execCommand("copy"); }
    copyBtn.textContent = "✅ 已複製！";
  };
  const closeBtn = document.createElement("button");
  closeBtn.textContent = "關閉";
  closeBtn.style.cssText = "flex:1;padding:13px;background:rgba(255,255,255,0.2);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:sans-serif;";
  closeBtn.onclick = () => document.body.removeChild(overlay);
  btnRow.appendChild(copyBtn);
  btnRow.appendChild(closeBtn);
  overlay.appendChild(title);
  overlay.appendChild(ta);
  overlay.appendChild(btnRow);
  document.body.appendChild(overlay);
  setTimeout(() => { ta.focus(); ta.select(); }, 100);
};

];

  { max:18,  label:"正常範圍",   color:"#22c55e", bg:"#f0fdf4" },
  { max:36,  label:"輕度受影響", color:"#84cc16", bg:"#f7fee7" },

function FmpiPage({ catId, color, catName }) {
  const emptyAnswers = () => ({
    ...Object.fromEntries(FMPI_QUESTIONS.map(q=>[q.id, null])),
    ...Object.fromEntries(FMPI_YN.map(q=>[q.id, null])),
  });

  const [answers, setAnswers] = React.useState(emptyAnswers());
  const [history, setHistory] = React.useState([]);
  const [tab, setTab] = React.useState("form"); // form | history

  React.useEffect(()=>{
    (async()=>{
      const h = await getStorage(`fmpi:${catId}`);
      if (h) setHistory(h);
    })();
  },[catId]);

  const answered17 = FMPI_QUESTIONS.filter(q=>answers[q.id]!==null).length;
  const answered4  = FMPI_YN.filter(q=>answers[q.id]!==null).length;
  const score17 = FMPI_QUESTIONS.reduce((s,q)=> answers[q.id]!==null ? s+answers[q.id] : s, 0);
  const score4  = FMPI_YN.reduce((s,q)=> answers[q.id]===true ? s+1 : s, 0);
  const totalScore = score17 + score4;
  const maxScore = answered17*4 + answered4;
  const level = FMPI_LEVELS.find(l=>totalScore<=l.max) || FMPI_LEVELS[3];

  const save = async () => {
    const entry = {
      date: todayStr(),
      answers: {...answers},
      score: totalScore,
      max: maxScore,
      level: level.label,
    };
    const newHistory = [entry, ...history].slice(0,24);
    await setStorage(`fmpi:${catId}`, newHistory);
    setHistory(newHistory);
    setAnswers(emptyAnswers());
    setTab("history");
    alert(`✅ 評估已儲存！\n${catName} 本次得分：${totalScore}/${maxScore}\n狀態：${level.label}`);
  };

  return (
    <div className="fmpi-page">
      {/* Tabs */}
      <div className="view-tabs" style={{margin:"0 0 14px"}}>

          style={tab==="history"?{background:color,boxShadow:`0 4px 12px ${color}55`}:{}}

      </div>

      {tab==="history" && (
        <>

          </div>
          {!history.length && <div className="empty-hint" style={{textAlign:"center",padding:40}}>尚無評估紀錄</div>}
          {history.map((h,i)=>{
            const lv = FMPI_LEVELS.find(l=>h.score<=l.max)||FMPI_LEVELS[3];
            return (
              <div key={i} className="fmpi-history-item">
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:800,color:"var(--text)"}}>{h.date}</div>
                  <div style={{fontSize:11,fontWeight:600,color:"var(--text3)",marginTop:2}}>滿分 {h.max} 分</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:24,fontWeight:900,color:lv.color}}>{h.score}</div>
                  <div style={{fontSize:10,fontWeight:700,color:lv.color,background:lv.bg,padding:"2px 8px",borderRadius:50}}>{lv.label}</div>
                </div>
              </div>
            );
          })}
        </>
      )}

      {tab==="form" && (
        <>
          <div className="fmpi-intro">
            <div className="fmpi-intro-title">🐾 貓咪行動與舒適度評估</div>
            <div className="fmpi-intro-sub">根據過去 1–2 週的觀察填寫，0 = 正常，4 = 最嚴重。建議每 3–4 週填一次。</div>
          </div>

          {/* Score preview */}
          {answered17+answered4 > 0 && (
            <div className="fmpi-score-card" style={{borderColor:level.color,background:level.bg}}>
              <div>
                <span className="fmpi-score-num" style={{color:level.color}}>{totalScore}</span>
                <span className="fmpi-score-max"> / {maxScore}</span>
              </div>
              <div className="fmpi-score-label" style={{color:level.color}}>{level.label}</div>
              <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>已回答 {answered17}/17 題 + {answered4}/4 題</div>
            </div>
          )}

          {/* Q1-17 */}
          <div className="fmpi-section">
            <div className="fmpi-section-title">行動能力評估（第 1–17 題）</div>
            {FMPI_QUESTIONS.map((q,qi)=>(
              <div key={q.id} className="fmpi-q">
                <div className="fmpi-q-text">{qi+1}. {q.text}</div>
                <div className="fmpi-scale">
                  {q.labels.map((lbl,n)=>{
                    const active = answers[q.id]===n;
                    const clr = ["#22c55e","#84cc16","#f59e0b","#f97316","#ef4444"][n];
                    return (
                      <button key={n} className={`fmpi-scale-btn${active?" active":""}`}
                        style={active?{background:`${clr}18`,borderColor:clr}:{}}
                        onClick={()=>setAnswers(a=>({...a,[q.id]:a[q.id]===n?null:n}))}>
                        <span className="fmpi-scale-n" style={active?{color:clr}:{}}>{n}</span>
                        <span className="fmpi-scale-l">{lbl}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>

          {/* Q18-21 */}
          <div className="fmpi-section">
            <div className="fmpi-section-title">整體狀況（第 18–21 題）</div>
            {FMPI_YN.map((q,qi)=>(
              <div key={q.id} className="fmpi-q">
                <div className="fmpi-q-text">{qi+18}. {q.text}</div>
                <div className="fmpi-yesno">
                  <button className={`fmpi-yn-btn${answers[q.id]===true?" yes-active":""}`}
                    onClick={()=>setAnswers(a=>({...a,[q.id]:a[q.id]===true?null:true}))}>
                    是
                  </button>
                  <button className={`fmpi-yn-btn${answers[q.id]===false?" no-active":""}`}
                    onClick={()=>setAnswers(a=>({...a,[q.id]:a[q.id]===false?null:false}))}>
                    否
                  </button>
                </div>
              </div>
            ))}
          </div>

          <button className="fmpi-save-btn"
            style={{background: answered17>=10 ? color : "#e2e4ea", color: answered17>=10 ? "white" : "#b0b6c4", cursor: answered17>=10?"pointer":"not-allowed"}}
            disabled={answered17<10}
            onClick={save}>
            {answered17<10 ? `請至少填寫 10 題（已填 ${answered17} 題）` : "儲存本次評估"}
          </button>
        </>
      )}
    </div>
  );
}

// 理想體重換算公式：每超過 BCS 5 一個等級約超重 10%
// 理想體重 = 目前體重 / (1 + (BCS-5) * 0.1)  當 BCS > 5
// 理想體重 = 目前體重 * (1 + (5-BCS) * 0.1)  當 BCS < 5（偏低修正）
function calcIdealWeight(currentWeight, bcs) {
  if (!currentWeight || !bcs) return null;
  const w = parseFloat(currentWeight);
  if (isNaN(w) || w <= 0) return null;
  if (bcs === 5) return w.toFixed(2);
  if (bcs > 5) {
    const overPct = (bcs - 5) * 0.1;
    return (w / (1 + overPct)).toFixed(2);
  } else {
    const underPct = (5 - bcs) * 0.1;
    return (w / (1 - underPct)).toFixed(2);
  }
}

                    <div style={{fontSize:11,color:"var(--text3)"}}>{site.desc}</div>
                  </div>
                  {scores[site.id]!==null && (
                    <span style={{fontSize:18,fontWeight:900,color:MCS_GRADES[scores[site.id]].color}}>{scores[site.id]}</span>
                  )}
                </div>
                <div style={{display:"flex",gap:8}}>
                  {MCS_GRADES.map(g=>{
                    const active = scores[site.id]===g.score;
                    return (
                      <button key={g.score}
                        style={{
                          flex:1, padding:"10px 6px", borderRadius:12,
                          border:`2px solid ${active?g.color:"rgba(41,128,212,0.12)"}`,
                          background: active?g.bg:"white",
                          cursor:"pointer", fontFamily:"var(--font)", transition:"all .15s",
                          display:"flex", flexDirection:"column", alignItems:"center", gap:3,
                        }}
                        onClick={()=>setScores(s=>({...s,[site.id]:s[site.id]===g.score?null:g.score}))}>
                        <span style={{fontSize:18,fontWeight:900,color:active?g.color:"var(--text2)"}}>{g.score}</span>
                        <span style={{fontSize:10,fontWeight:700,color:active?g.color:"var(--text3)"}}>{g.label}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>

          {/* Overall score */}
          <div className="fmpi-section">
            <div className="fmpi-section-title">整體 MCS 評分（最終分數）</div>
            <div style={{fontSize:12,color:"var(--text3)",marginBottom:10}}>
              {answered===4 ? `各部位平均：${(totalScore/4).toFixed(1)} → 建議評為 ${Math.round(totalScore/4)}` : "可直接選擇最終評分，或先填寫各部位後系統自動建議"}
            </div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              {MCS_GRADES.map(g=>{
                const active = finalScore===g.score;
                return (
                  <button key={g.score}
                    style={{
                      flex:1, padding:"14px 8px", borderRadius:14,
                      border:`2px solid ${active?g.color:"rgba(41,128,212,0.12)"}`,
                      background: active?g.bg:"white",
                      cursor:"pointer", fontFamily:"var(--font)", transition:"all .18s",
                      display:"flex", flexDirection:"column", alignItems:"center", gap:4,
                      boxShadow: active?`0 4px 12px ${g.color}40`:"none",
                    }}
                    onClick={()=>setOverall(prev=>prev===g.score?null:g.score)}>
                    <span style={{fontSize:24,fontWeight:900,color:active?g.color:"var(--text2)"}}>{g.score}</span>
                    <span style={{fontSize:11,fontWeight:800,color:active?g.color:"var(--text2)"}}>{g.label}</span>
                    <span style={{fontSize:9,color:"var(--text3)",textAlign:"center",lineHeight:1.3}}>{g.en}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{marginBottom:12}}>
            <span className="field-label">備註</span>
            <textarea className="inp" value={note} onChange={e=>setNote(e.target.value)} rows={2} placeholder="觸診觀察補充、與上次比較…"/>
          </div>

          <button className="fmpi-save-btn"
            style={{background:finalScore!==null?color:"#e2e4ea", color:finalScore!==null?"white":"#b0b6c4", cursor:finalScore!==null?"pointer":"not-allowed"}}
            disabled={finalScore===null}
            onClick={save}>
            {finalScore===null ? "請選擇整體 MCS 評分" : `儲存 MCS 評分（${finalScore} — ${grade?.label}）`}
          </button>
        </>
      )}
    </div>
  );
}

// ─── Cat Tab ──────────────────────────────────────────────────────────────────
function CatTab({ meta }) {
  const { id:catId, color, colorLight, colorMid, grad, profileGrad } = meta;
  const [cat, setCat] = React.useState({name:"",birthday:""});
  const [date, setDate] = React.useState(todayStr);
  const [daily, setDaily] = React.useState(emptyDaily());
  const [saved, setSaved] = React.useState(false);
  const [picker, setPicker] = React.useState(null);
  const [showHist, setShowHist] = React.useState(false);
  const [prevWeight, setPrevWeight] = React.useState(null);
  const [view, setView] = React.useState("record");
  const [dirty, setDirty] = React.useState(false);
  const [showToast, setShowToast] = React.useState(false);
  const [showMenu, setShowMenu] = React.useState(false);

  React.useEffect(()=>{
    (async()=>{const c=await getStorage(`cat:${catId}`);if(c)setCat(c);})();
  },[catId]);

  React.useEffect(()=>{
    (async()=>{
      const d=await getStorage(`daily:${catId}:${date}`);
      setDaily(d||emptyDaily());
      setDirty(false);
      const allKeys=await (async()=>{ const _p=`daily:${catId}:`; const _k=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(_p))_k.push(k); } return {keys:_k}; })();
      const sorted=(allKeys?.keys||[]).filter(k=>k<`daily:${catId}:${date}`).sort().reverse();
      let pw=null;
      for(const k of sorted){const v=await getStorage(k);if(v?.weight){pw=v.weight;break;}}
      setPrevWeight(pw);
    })();
  },[catId,date]);

  const save=async()=>{
    await setStorage(`daily:${catId}:${date}`,daily);
    await setStorage(`cat:${catId}`,cat);
    setSaved(true); setDirty(false);
    // 自動備份在背景執行，不阻塞 UI
    setTimeout(()=>{
      collectAllData().then(all=>{
        setStorage("backup:auto", JSON.stringify(all));
        setStorage("backup:autoDate", todayStr());
      });
    }, 0);
    setShowToast(true);
    setTimeout(()=>setShowToast(false), 1000);
    setTimeout(()=>setSaved(false), 2200);
  };

  const exportData = async () => {
    const all = await collectAllData();
    const json = JSON.stringify(all, null, 2);
    await setStorage("backup:lastExport", todayStr());

    // Create overlay modal with copyable text
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;flex-direction:column;padding:16px;gap:10px;";

    const title = document.createElement("div");
    title.style.cssText = "color:white;font-size:15px;font-weight:800;font-family:sans-serif;";
    title.textContent = "📋 請全選並複製以下資料，儲存到備忘錄或文字檔";

    const ta = document.createElement("textarea");
    ta.value = json;
    ta.style.cssText = "flex:1;border-radius:12px;border:none;font-size:11px;padding:12px;font-family:monospace;resize:none;";
    ta.readOnly = true;

    const btnRow = document.createElement("div");
    btnRow.style.cssText = "display:flex;gap:10px;";

    const copyBtn = document.createElement("button");
    copyBtn.textContent = "📋 全選複製";
    copyBtn.style.cssText = "flex:2;padding:13px;background:#3a6fa8;color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:sans-serif;";
    copyBtn.onclick = async () => {
      ta.select();
      try {
        await navigator.clipboard.writeText(json);
        copyBtn.textContent = "✅ 已複製！";
      } catch {
        document.execCommand("copy");
        copyBtn.textContent = "✅ 已複製！";
      }
    };

    const closeBtn = document.createElement("button");
    closeBtn.textContent = "關閉";
    closeBtn.style.cssText = "flex:1;padding:13px;background:rgba(255,255,255,0.2);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:sans-serif;";
    closeBtn.onclick = () => document.body.removeChild(overlay);

    btnRow.appendChild(copyBtn);
    btnRow.appendChild(closeBtn);
    overlay.appendChild(title);
    overlay.appendChild(ta);
    overlay.appendChild(btnRow);
    document.body.appendChild(overlay);

    // Auto select all
    setTimeout(() => { ta.focus(); ta.select(); }, 100);
  };
  const up=(path,val)=>{
    setDirty(true);
    setDaily(p=>{
      const n=JSON.parse(JSON.stringify(p));
      const parts=path.split(".");let c=n;
      for(let i=0;i<parts.length-1;i++)c=c[parts[i]];
      c[parts[parts.length-1]]=val;return n;
    });
  };
  const add=(k,o)=>{ setDirty(true); setDaily(p=>({...p,[k]:[...(p[k]||[]),o]})); };
  const rem=(k,i)=>{ setDirty(true); setDaily(p=>({...p,[k]:p[k].filter((_,j)=>j!==i)})); };
  const upItem=(k,i,f,v)=>{ setDirty(true); setDaily(p=>({...p,[k]:p[k].map((x,j)=>j===i?{...x,[f]:v}:x)})); };
  const togIss=(v)=>{ setDirty(true); setDaily(p=>({...p,issues:p.issues.includes(v)?p.issues.filter(x=>x!==v):[...p.issues,v]})); };
  const diff=daily.weight&&prevWeight?(parseFloat(daily.weight)-parseFloat(prevWeight)).toFixed(1):null;

  if(showHist) return <HistoryPage cat={cat} catId={catId} color={color} onClose={()=>setShowHist(false)}/>;

  // icon bg helper
  const iconBg = (clr) => ({ background:`${clr}18` });

  return (
    <>
      {showToast && (
        <>
          <div className="toast-overlay"/>
          <div className="save-toast">
            <div className="save-toast-icon">✅</div>
            <div className="save-toast-title">已完成紀錄！</div>
            <div className="save-toast-sub">{date}</div>
          </div>
        </>
      )}
      {picker&&<FoodPicker type={picker.type} color={color} onClose={()=>setPicker(null)} onSelect={item=>{
        const t=picker.type;
        if(t==="wet") add("wets",{...emptyWet(), food:item.brand+" "+item.name, ingredients:item.meat||"", weight:item.weight||"", origin:item.origin||""});
        else if(t==="dry") add("drys",{...emptyDry(), food:item.brand+" "+item.name, ingredients:item.meat||"", origin:item.origin||""});
        else if(t==="supplement") add("supplements",{name:item.brand+" "+item.name,dose:item.dosage||"",note:item.note||""});
        else if(t==="snack") add("snacks",{type:item.brand+" "+item.name,ingredients:item.meat||"",amount:item.weight?`${item.weight}g`:""});
        setPicker(null);
      }}/>}

      {/* Hamburger menu overlay */}
      {showMenu && (
        <>
          <div className="menu-overlay" onClick={()=>setShowMenu(false)}/>
          <div className="menu-drawer">
            <div className="menu-drawer-head">
              <span className="menu-drawer-title">選單</span>
              <button className="menu-close-btn" onClick={()=>setShowMenu(false)}>✕</button>
            </div>
            <div className="menu-body">
              <div className="menu-section-label">紀錄</div>
              {[
                {v:"record", icon:"📝", bg:"#eff6ff", title:"每日紀錄", sub:"記錄今天的飲食與健康"},
                {v:"analytics", icon:"📊", bg:"#f0fdf4", title:"數據分析", sub:"體重趨勢、飲食統計"},
              ].map(item=>(
                <button key={item.v} className={`menu-item${view===item.v?" active":""}`}
                  onClick={()=>{ setView(item.v); setShowMenu(false); }}>
                  <div className="menu-item-icon" style={{background:item.bg}}>{item.icon}</div>
                  <div className="menu-item-text">
                    <span className="menu-item-title">{item.title}</span>
                    <span className="menu-item-sub">{item.sub}</span>
                  </div>
                  {view===item.v && <span style={{color,fontSize:16}}>✓</span>}
                </button>
              ))}

              <div className="menu-divider"/>
              <div className="menu-section-label">健康評估量表</div>
              {[
                {v:"fmpi", icon:"🐾", bg:"#fef9c3", title:"行動評估（FMPI）", sub:"每 3–4 週填一次"},
                {v:"qol",  icon:"💙", bg:"#eff6ff", title:"生活品質（5H2M）", sub:"每月或治療期間每週"},
                {v:"mcs",  icon:"💪", bg:"#f0fdf4", title:"肌肉評分（MCS）",  sub:"每月或每次就診"},
                {v:"bcs",  icon:"⚖️", bg:"#fef3c7", title:"體況評分（BCS）",  sub:"每月，含理想體重換算"},
              ].map(item=>(
                <button key={item.v} className={`menu-item${view===item.v?" active":""}`}
                  onClick={()=>{ setView(item.v); setShowMenu(false); }}>
                  <div className="menu-item-icon" style={{background:item.bg}}>{item.icon}</div>
                  <div className="menu-item-text">
                    <span className="menu-item-title">{item.title}</span>
                    <span className="menu-item-sub">{item.sub}</span>
                  </div>
                  {view===item.v && <span style={{color,fontSize:16}}>✓</span>}
                </button>
              ))}

              <div className="menu-divider"/>
              <div className="menu-section-label">資料</div>
              <button className="menu-item" onClick={()=>{ setShowHist(true); setShowMenu(false); }}>
                <div className="menu-item-icon" style={{background:"#f1f5f9"}}>📋</div>
                <div className="menu-item-text">
                  <span className="menu-item-title">所有紀錄</span>
                  <span className="menu-item-sub">查看與管理歷史紀錄</span>
                </div>
              </button>
              <button className="menu-item" onClick={()=>{ setShowMenu(false); exportData(); }}>
                <div className="menu-item-icon" style={{background:"#f1f5f9"}}>📤</div>
                <div className="menu-item-text">
                  <span className="menu-item-title">匯出資料</span>
                  <span className="menu-item-sub">備份所有紀錄</span>
                </div>
              </button>
            </div>
          </div>
        </>
      )}

      {/* Profile */}
      <div className="profile-card">
        <div className="profile-banner" style={{background: "transparent"}}>
          <div className="profile-cat-icon">
            <CatIcon catId={catId} size={34} color="white" />
          </div>
          <div className="profile-info">
            <div className="profile-name-row">
              <input
                className="cat-name-inp"
                value={cat.name}
                onChange={e=>{ setCat(c=>({...c,name:e.target.value})); setDirty(true); }}
                placeholder="輸入名字"
                size={Math.max(cat.name.length, 4)}
              />
            </div>
            <div className="profile-meta">
              <input type="date" className="bday-inp" value={cat.birthday}
                onChange={e=>{ setCat(c=>({...c,birthday:e.target.value})); setDirty(true); }}/>
              {cat.birthday && <span className="age-badge" style={{background:`${color}18`, color}}>{calcAge(cat.birthday)}</span>}
            </div>
          </div>
          {/* Hamburger button */}
          <button className="hamburger-btn" onClick={()=>setShowMenu(true)}>
            <div className="hamburger-line"/>
            <div className="hamburger-line"/>
            <div className="hamburger-line"/>
          </button>
        </div>
      </div>

      {/* Pages */}
      {view==="analytics"&&<AnalyticsPage catId={catId} color={color}/>}
      {view==="fmpi"&&<FmpiPage catId={catId} color={color} catName={cat.name||catId}/>}
      {view==="qol"&&<HhhhhmmPage catId={catId} color={color} catName={cat.name||catId}/>}
      {view==="mcs"&&<McsPage catId={catId} color={color} catName={cat.name||catId}/>}
      {view==="bcs"&&<BcsPage catId={catId} color={color} catName={cat.name||catId}/>}


      {view==="record"&&(
        <div className="page">
          {/* Date nav */}
          <div className="date-nav">
            <button className="dnav-btn" onClick={()=>{const d=new Date(date);d.setDate(d.getDate()-1);setDate(d.toISOString().slice(0,10));}}>‹</button>
            <input type="date" className="dnav-inp" value={date} onChange={e=>setDate(e.target.value)}/>
            <button className="dnav-btn" onClick={()=>{const d=new Date(date);d.setDate(d.getDate()+1);setDate(d.toISOString().slice(0,10));}}>›</button>
            <button className="today-btn" onClick={()=>setDate(todayStr())}>今天</button>
          </div>

          {/* Weight & Behavior */}
          <div className="card">
            <div className="card-head">
              <div className="card-title">
                <div className="card-icon" style={iconBg(color)}>⚖️</div>
                體重 &amp; 行為評估
              </div>
            </div>
            <div className="card-body">
              <div className="field-group">
                <span className="field-label">今日體重</span>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <div className="wt-wrap">
                    <input type="number" step="0.1" className="inp wt-inp" value={daily.weight}
                      onChange={e=>up("weight",e.target.value)} placeholder="4.2"/>
                    <span className="wt-unit">kg</span>
                  </div>
                  {diff!==null&&<span className={`diff-pill ${diff>0?"diff-up":diff<0?"diff-dn":"diff-eq"}`}>{diff>0?"+":""}{diff} kg</span>}
                </div>
              </div>
              <div className="divider"/>
              {BEHAVIOR_DIMS.map(dim=>(
                <div key={dim.key} className="behavior-dim">
                  <div className="behavior-dim-head">
                    <div className="behavior-dim-icon" style={{background:`${dim.color}18`}}>{dim.icon}</div>
                    <div style={{flex:1}}>
                      <span className="behavior-dim-title">{dim.label}</span>
                      <span className="behavior-dim-desc">{dim.desc}</span>
                    </div>
                    {daily[dim.key]>0 && (
                      <span className="behavior-score-val" style={{color:dim.color}}>{daily[dim.key]}</span>
                    )}
                  </div>
                  <div className="behavior-score-row">
                    {dim.levels.map(lv=>{
                      const active = daily[dim.key]===lv.n;
                      return (
                        <button key={lv.n}
                          className={`behavior-score-btn${active?" bsa":""}`}
                          style={active?{background:`${dim.color}15`,borderColor:dim.color}:{}}
                          onClick={()=>up(dim.key, daily[dim.key]===lv.n ? 0 : lv.n)}>
                          <span className="bsn" style={active?{color:dim.color}:{}}>{lv.n}</span>
                          <span className="bsl" style={active?{color:dim.color}:{}}>{lv.label}</span>
                          {lv.sub && <span className="bss">{lv.sub}</span>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Wet food */}
          <div className="card">
            <div className="card-head">
              <div className="card-title"><div className="card-icon" style={iconBg("#06b6d4")}>🐟</div>濕食</div>
              <div className="add-row">
                <button className="add-btn add-p" style={{borderColor:color,color}} onClick={()=>setPicker({type:"wet"})}>＋ 食品庫</button>
                <button className="add-btn add-s" onClick={()=>add("wets",emptyWet())}>＋ 手動</button>
              </div>
            </div>
            <div className="card-body">
              {!(daily.wets||[]).length && <div className="empty-hint">尚未記錄</div>}
              {(daily.wets||[]).map((w,i)=>(
                <div key={i} className="sub-item">
                  <div className="sub-row">
                    <input className="inp" style={{flex:1}} value={w.food} onChange={e=>upItem("wets",i,"food",e.target.value)} placeholder="食品名稱"/>
                    <button className="del-btn" onClick={()=>rem("wets",i)}>✕</button>
                  </div>
                  <div className="row field-group">
                    <div style={{flex:1}}>
                      <span className="field-label">份量</span>
                      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:4}}>
                        {["½罐","整罐"].map(q=>(
                          <button key={q}
                            onClick={()=>upItem("wets",i,"portion",w.portion===q?"":q)}
                            style={{
                              padding:"5px 12px",borderRadius:50,fontSize:12,fontWeight:700,
                              border:`1.5px solid ${w.portion===q?color:"rgba(41,128,212,0.18)"}`,
                              background:w.portion===q?`${color}15`:"white",
                              color:w.portion===q?color:"var(--text2)",
                              cursor:"pointer",fontFamily:"var(--font)",transition:"all .15s",flexShrink:0
                            }}>{q}</button>
                        ))}
                      </div>
                      <div className="wt-wrap"><input type="number" className="inp wt-inp" value={w.weight} onChange={e=>upItem("wets",i,"weight",e.target.value)} placeholder="80"/><span className="wt-unit">g</span></div>
                    </div>
                    <div style={{width:88}}>
                      <span className="field-label">產地</span>
                      <input className="inp" value={w.origin} onChange={e=>upItem("wets",i,"origin",e.target.value)} placeholder="泰國"/>
                    </div>
                  </div>
                  <div className="field-group">
                    <span className="field-label">成分</span>
                    <textarea className="inp" value={w.ingredients} onChange={e=>upItem("wets",i,"ingredients",e.target.value)} rows={2} placeholder="成分內容…"/>
                  </div>
                  <div className="divider"/>
                  <div className="field-group">
                    <span className="field-label">食物質地</span>
                    <div className="texture-grid">
                      {TEXTURES.map(t=>(
                        <button key={t.v} className={`tex-btn${w.texture===t.v?" ta":""}`}
                          style={w.texture===t.v?{background:`${color}12`,borderColor:color}:{}}
                          onClick={()=>upItem("wets",i,"texture",w.texture===t.v?"":t.v)}>
                          <span className="ti">{t.icon}</span>
                          <span className="tl" style={w.texture===t.v?{color}:{}}>{t.v}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="divider"/>
                  <div className="field-group">
                    <span className="field-label">吃的狀況</span>
                    <div className="eat-row">
                      {[{v:"✓",l:"吃完",c:"ea-done"},{v:"⅓",l:"吃 1/3",c:"ea-third"},{v:"½",l:"吃一半",c:"ea-half"}].map(o=>(
                        <button key={o.v} className={`eat-btn${w.eaten===o.v?" "+o.c:""}`}
                          onClick={()=>upItem("wets",i,"eaten",w.eaten===o.v?"":o.v)}>{o.v} {o.l}</button>
                      ))}
                    </div>
                    <div className="eat-row-2">
                      {[{v:"⅔",l:"吃 2/3",c:"ea-two3"},{v:"✕",l:"沒吃",c:"ea-skip"}].map(o=>(

                          onClick={()=>upItem("wets",i,"eaten",w.eaten===o.v?"":o.v)}>{o.v} {o.l}</button>
                      ))}
                    </div>
                  </div>
                  {(w.eaten && w.eaten!=="✕") && (
                    <div className="field-group">
                      <span className="field-label">吃飯態度</span>

// ─── Reminder System ──────────────────────────────────────────────────────────
const DEFAULT_REMINDERS = {
  litter:   { cycle:30, lastDone:"2026-04-12", label:"換貓砂",   icon:"🪣", color:"#7c3aed", bg:"#f5f3ff", shared:true  },
  dewormer_sakura: { cycle:30, lastDone:"2026-04-12", label:"點驅蟲藥（櫻）", icon:"💊", color:"#CA8182", bg:"#fdf0f0", shared:false, catId:"sakura" },
  dewormer_xi:     { cycle:30, lastDone:"2026-04-12", label:"點驅蟲藥（樨）", icon:"💊", color:"#d4845a", bg:"#fdf4ee", shared:false, catId:"xi"     },
};

function parseDate(str) {
  const [y,m,d] = str.split("-").map(Number);
  return new Date(y, m-1, d);
}
function daysBetween(a, b) {
  return Math.round((parseDate(b) - parseDate(a)) / 86400000);
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  return daysBetween(todayStr(), dateStr);
}
function daysOverdue(lastDone, cycle) {
  if (!lastDone) return cycle; // never done = fully overdue
  const elapsed = daysBetween(lastDone, todayStr());
  return elapsed - cycle;
}
function urgencyColor(overdue) {
  if (overdue >= 0) return "#ef4444";
  if (overdue >= -2) return "#f97316";
  return "#22c55e";
}
function urgencyBg(overdue) {
  if (overdue >= 0) return "#fef2f2";
  if (overdue >= -2) return "#fff7ed";
  return "#f0fdf4";
}

function ReminderSystem({ catId, catNames, allVetFollowUps }) {
  const [reminders, setReminders] = React.useState(DEFAULT_REMINDERS);

  React.useEffect(()=>{
    (async()=>{
      const saved = await getStorage("reminders:global");
      if (saved) {
        // Merge saved data with defaults, keeping DEFAULT cycle values but restoring lastDone
        const merged = {};
        for (const key of Object.keys(DEFAULT_REMINDERS)) {
          merged[key] = { ...DEFAULT_REMINDERS[key], ...(saved[key]||{}), cycle: DEFAULT_REMINDERS[key].cycle };
        }
        setReminders(merged);
      }
    })();
  },[]);

  const saveReminders = async (next) => {
    setReminders(next);
    await setStorage("reminders:global", next);
  };

  const [editingKey, setEditingKey] = React.useState(null);
  const [editDate, setEditDate] = React.useState("");

  const markDone = async (key, date) => {
    const next = {...reminders, [key]:{...reminders[key], lastDone: date || todayStr()}};
    await saveReminders(next);
    setEditingKey(null);
  };

  const setCycle = async (key, val) => {
    const next = {...reminders, [key]:{...reminders[key], cycle:parseInt(val)||1}};
    await saveReminders(next);
  };

  // Build active reminders list (cycle-based)
  const activeReminders = Object.entries(reminders)
    .filter(([,r]) => !r.shared || r.shared) // all
    .map(([key, r]) => ({
      key, ...r,
      overdue: daysOverdue(r.lastDone, r.cycle),
      nextDue: r.lastDone
        ? (() => {
            const [y,m,d] = r.lastDone.split("-").map(Number);
            const date = new Date(y, m-1, d + r.cycle);
            return `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}`;
          })()
        : "尚未記錄",
    }));

  // Vet follow-up reminders (date-based, from vetVisits)
  const vetReminders = allVetFollowUps.flatMap(({catId:cid, followUp, clinic, reason}) => {
    if (!followUp) return [];
    const until = daysUntil(followUp);
    if (until < -7) return []; // more than 7 days past, hide
    return [{ key:`vet_${cid}_${followUp}`, icon:"🏥", label:`回診 ${clinic||""}`, sub:reason||"", date:followUp, until, catId:cid, color:"#1d4ed8", bg:"#eff6ff" }];
  });

  const [collapsed, setCollapsed] = React.useState(false);

  const allItems = [...activeReminders, ...vetReminders];
  const urgentCount = allItems.filter(r =>
    r.key.startsWith("vet_") ? r.until <= 0 : r.overdue >= 0
  ).length;

  const getStatus = (r) => {
    const isVet = r.key.startsWith("vet_");
    if (!isVet && r.lastDone === todayStr()) return "done";
    if (isVet) return r.until <= 0 ? "urgent" : r.until <= 3 ? "soon" : "ok";
    return r.overdue >= 0 ? "urgent" : r.overdue >= -3 ? "soon" : "ok";
  };
  const SC = {
    done:   { dot:"#22c55e", bg:"#f0fdf4", text:"#16a34a" },
    urgent: { dot:"#ef4444", bg:"#fef2f2", text:"#dc2626" },
    soon:   { dot:"#f97316", bg:"#fff7ed", text:"#c2410c" },
    ok:     { dot:"#22c55e", bg:"transparent", text:"#16a34a" },
  };

  return (
    <div className="notif-area">
      <div className="notif-header" onClick={()=>setCollapsed(c=>!c)}>
        <div className="notif-header-left">
          <span style={{fontSize:16}}>🔔</span>
          <span className="notif-header-title">提醒事項</span>
          {urgentCount > 0
            ? <span className="notif-badge">{urgentCount} 項待處理</span>
            : <span className="notif-badge ok">全部正常</span>
          }
        </div>
        <span className="notif-toggle">{collapsed ? "展開 ▼" : "收起 ▲"}</span>
      </div>

      {!collapsed && (
        <div className="notif-list">
          {allItems.map(r => {
            const isVet = r.key.startsWith("vet_");
            const justDone = !isVet && r.lastDone === todayStr();
            const status = getStatus(r);
            const sc = SC[status];
            const catName = isVet ? (catNames[r.catId]||r.catId) : null;
            const lastText = !isVet && r.lastDone ? r.lastDone.replace(/-/g,"/") : null;
            const nextText = !isVet ? r.nextDue : null;
            const statusText = isVet
              ? (r.until < 0 ? `已逾期 ${-r.until} 天` : r.until === 0 ? "今天！" : `還有 ${r.until} 天`)
              : justDone ? "今天已完成"
              : r.overdue >= 0 ? `已逾期 ${r.overdue} 天`
              : `還有 ${-r.overdue} 天`;

            return (
              <div key={r.key} className="notif-row" style={{background: sc.bg}}>
                <div className="notif-dot" style={{background: sc.dot}}/>
                <div className="notif-icon" style={{background:`${sc.dot}18`}}>
                  {justDone ? "✅" : r.icon}
                </div>
                <div className="notif-info">
                  <span className="notif-title">
                    {r.label}{catName ? ` · ${catName}` : ""}
                  </span>
                  <div className="notif-meta">
                    <span className="notif-meta-item" style={{color:sc.text,fontWeight:800}}>
                      {statusText}
                    </span>
                    {lastText && (
                      <span className="notif-meta-item" style={{color:"var(--text3)"}}>
                        上次 {lastText}
                      </span>
                    )}
                    {nextText && (
                      <span className="notif-meta-item" style={{color:"var(--text2)"}}>
                        下次 {nextText}
                      </span>
                    )}
                    {!isVet && (
                      <span className="notif-meta-item" style={{color:"var(--text3)"}}>
                        每 {r.cycle} 天
                      </span>
                    )}
                    {isVet && r.sub && (
                      <span className="notif-meta-item" style={{color:"var(--text3)"}}>{r.sub}</span>
                    )}
                  </div>
                </div>
                {!isVet && !justDone && (
                  editingKey === r.key ? (
                    <div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end",flexShrink:0}}>
                      <input type="date" value={editDate}
                        onChange={e=>setEditDate(e.target.value)}
                        style={{padding:"5px 8px",border:"1.5px solid #a7f3d0",borderRadius:8,fontSize:12,fontWeight:600,background:"#f0fdf4",color:"var(--text)",fontFamily:"var(--font)",width:130}}/>
                      <div style={{display:"flex",gap:5}}>
                        <button className="notif-action"
                          style={{background:"#22c55e",color:"white",fontSize:11,padding:"4px 10px"}}
                          onClick={async()=>{
                            if(r.key==="backup") await downloadJSON();
                            markDone(r.key, editDate);
                          }}>確認</button>
                        <button className="notif-action"
                          style={{background:"#f1f5f9",color:"var(--text2)",fontSize:11,padding:"4px 10px"}}
                          onClick={()=>setEditingKey(null)}>取消</button>
                      </div>
                    </div>
                  ) : (
                    <button className="notif-action"
                      style={{background:sc.dot, color:"white"}}
                      onClick={()=>{ setEditingKey(r.key); setEditDate(todayStr()); }}>
                      {r.key==="backup" ? "下載" : "完成"}
                    </button>
                  )
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState("sakura");
  const [catInfo, setCatInfo] = React.useState({sakura:{name:"",bday:""},xi:{name:"",bday:""}});
  const [vetFollowUps, setVetFollowUps] = React.useState([]);

  React.useEffect(()=>{
    (async()=>{
      for(const c of CATS){
        const d=await getStorage(`cat:${c.id}`);
        if(d) setCatInfo(p=>({...p,[c.id]:{name:d.name||"",bday:d.birthday||""}}));
      }
      // collect all vet follow-ups
      const allFollowUps = [];
      for (const c of CATS) {
        const keys = await (async()=>{ const _p=`daily:${c.id}:`; const _k=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(_p))_k.push(k); } return {keys:_k}; })();
        for (const k of (keys?.keys||[])) {
          const rec = await getStorage(k);
          if (rec?.vetVisits?.length) {
            rec.vetVisits.forEach(v => {
              if (v.followUp) allFollowUps.push({ catId:c.id, followUp:v.followUp, clinic:v.clinic, reason:v.reason });
            });
          }
        }
      }
      const seen = new Set();
      const filtered = allFollowUps.filter(f=>{
        const key = `${f.catId}_${f.followUp}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return daysUntil(f.followUp) > -8;
      });
      setVetFollowUps(filtered);
    })();
  },[]);

  const catNames = {sakura: catInfo.sakura?.name||"櫻", xi: catInfo.xi?.name||"樨"};

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <div className="cat-tabs">
          {CATS.map(c=>(
            <button key={c.id} className={`cat-tab${tab===c.id?" active":""}`}
              style={tab===c.id ? {background:c.grad} : {}}
              onClick={()=>setTab(c.id)}>
              <div className="ct-inner">
                <span className="ct-emoji" style={{filter: tab===c.id ? "none" : "grayscale(0.6) opacity(0.55)"}}>
                  <CatIcon catId={c.id} size={38} color={c.color} />
                </span>
                <div className="ct-text">
                  <span className="ct-name" style={{color: tab===c.id ? "white" : c.color}}>
                    {catInfo[c.id]?.name || c.label}
                  </span>
                </div>
              </div>
            </button>
          ))}
        </div>
        <ReminderSystem catId={tab} catNames={catNames} allVetFollowUps={vetFollowUps}/>
        <CatTab key={tab} meta={CATS.find(c=>c.id===tab)}/>
      </div>
    </>
  );
}

const rootEl = document.getElementById('root');
if (typeof ReactDOM.createRoot === 'function') {
  ReactDOM.createRoot(rootEl).render(React.createElement(App));
} else {
  ReactDOM.render(React.createElement(App), rootEl);
}
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(()=>{});
      });
    }
  </script>
</body>
</html>
